name: Deploy Azure Infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: projHEDV
  TEMPLATE_FILE: infra/bicep/main.bicep
  PARAMETER_FILE: infra/bicep/parameters/dev.json

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate Bicep
        run: |
          az bicep build --file "$TEMPLATE_FILE"

      - name: Deploy Bicep
        run: |
          DEPLOYMENT_NAME="main-$(date +%Y%m%d%H%M%S)"
          az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --template-file "$TEMPLATE_FILE" \
            --parameters @"$PARAMETER_FILE"
